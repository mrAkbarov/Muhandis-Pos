services:
  postgres:
    image: postgres:16-alpine
    container_name: pos_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1"
      POSTGRES_DB: pos_cursor
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pos_cursor"]
      interval: 3s
      timeout: 5s
      retries: 15

  backend:
    build: ./backend
    container_name: pos_backend
    privileged: true
    ports:
      - "8000:8000"
    environment:
      POSTGRES_DATABASE: pos_cursor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      USE_SQLITE: "false"
      DEBUG: "true"
      DJANGO_SECRET_KEY: docker-dev-secret-key
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000
      SEED_DEMO: "0"
      THERMAL_PRINTER_NAME: "Termo"
      THERMAL_PRINTER_DEVICE: "/dev/usb/lp2"
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
      - /run/cups/cups.sock:/run/cups/cups.sock
      - /dev/usb:/dev/usb
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: dev
    container_name: pos_frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ""
      VITE_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
  backend_venv:
  frontend_node_modules:
